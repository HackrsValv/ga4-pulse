# pulse.config.yaml — full schema (commented). Validated by Zod at runtime.

# Pick ONE analytics source:
source:
  type: ga4                               # 'ga4' (default) or 'openpanel'
  property_id: 'YOUR_PROPERTY_ID'         # required for ga4 — GA4 property ID (e.g. '533218728')
  hostname_regex: 'yoursite\.com$'         # optional — partial-regex filter on hostName

# OpenPanel example (uncomment + delete the ga4 block above):
# source:
#   type: openpanel
#   project_id: 'proj_xxx'                # OpenPanel project ID
#   api_url: 'https://api.openpanel.dev'  # override for self-hosted
#   hostname_regex: 'yoursite\.com$'       # optional

# Legacy shorthand (still accepted; equivalent to source: { type: ga4, ... }):
# ga4:
#   property_id: 'YOUR_PROPERTY_ID'
#   hostname_regex: 'yoursite\.com$'

window: 24h                               # 1h | 24h | 48h | 72h | 7d | 30d
timezone: 'Europe/Vilnius'                # IANA timezone for date math + subject line

subject_property_label: ''                # optional — overrides the property name shown in subject

report:
  sections:                               # opt-in order; defaults to all four
    - headlines
    - usage
    - system
    - followups
  bot_signature_threshold: 0.6            # warn when (direct)/(none) > this fraction of sessions
  conversion_events:                      # event names counted as conversions
    - conversion
    - purchase
    - lead
  funnel_events:                          # event names shown in Usage > Event funnel
    - page_view
    - cta_click
    - form_start
    - form_field_error
  # deadline:                             # optional countdown bullet in Followups
  #   date: '2026-07-05'
  #   label: 'Camp deadline'

sender:
  type: mailgun                           # mailgun | resend | sendgrid | smtp | slack-webhook
  region: eu                              # mailgun only — 'us' or 'eu'
  from: 'pulse@yoursite.com'
  to: 'me@example.com'                    # string or array of strings
  subject_prefix: ''                      # e.g. '[STAGING]'

# Secrets ALWAYS come from env vars / GitHub secrets — never put them in this file.
# GA4: GA4_OAUTH_CLIENT_ID, GA4_OAUTH_CLIENT_SECRET, GA4_OAUTH_REFRESH_TOKEN
# OpenPanel: OPENPANEL_CLIENT_ID, OPENPANEL_CLIENT_SECRET
# Sender-specific: MAILGUN_API_KEY / RESEND_API_KEY / SENDGRID_API_KEY / SMTP_URL / SLACK_WEBHOOK_URL
